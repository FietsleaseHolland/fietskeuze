<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fietskeuzehulp — Fietslease Holland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Mulish:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#282A2B;
    --track-bg:#DCDCDC;
    --offwhite:#EFEFEF;
    --card:#FFFFFF;
    --brand:#669933;
    --brand-dark:#4F7727;
    --signal:#4F7727;
    --signal-bg:#E7EFDC;
    --grey:#545454;
    --border:#D6D6D2;
    --tile:#E7ECDF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--offwhite);
    color:var(--charcoal);
    font-family:'Mulish', system-ui, sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    padding:28px 20px 40px;
  }
  .logo{
    height:30px;
    display:block;
    margin:0 0 22px;
  }
  .title-row{
    display:flex;
    align-items:stretch;
    gap:12px;
    margin:0 0 10px;
  }
  .title-bar{
    flex:0 0 4px;
    width:4px;
    background:var(--brand);
    border-radius:2px;
  }
  h1{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:26px;
    line-height:1.25;
    margin:0;
    letter-spacing:-.01em;
  }
  .intro{
    color:var(--grey);
    font-size:15px;
    margin:0 0 26px;
    max-width:46ch;
  }
  .road-wrap{margin-bottom:26px;}
  .road{
    position:relative;
    height:6px;
    background:var(--track-bg);
    border-radius:3px;
    overflow:visible;
  }
  .road-fill{
    position:absolute;
    inset:0 auto 0 0;
    width:0%;
    background:var(--brand);
    border-radius:3px;
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }
  .road-marker{
    position:absolute;
    top:50%;
    left:0%;
    transform:translate(-50%,-50%);
    width:18px;
    height:18px;
    background:var(--brand);
    border:2px solid var(--offwhite);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:left .45s cubic-bezier(.4,0,.2,1);
  }
  .road-marker svg{width:10px;height:10px;display:block;}
  .road-label{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--grey);
  }
  .opt-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:12px;
  }
  .opt-card{
    text-align:left;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--card);
    padding:0;
    overflow:hidden;
    cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
  }
  .opt-card:hover{border-color:var(--brand);}
  .opt-card:focus-visible{outline:2px solid var(--brand); outline-offset:2px;}
  .opt-image{
    height:84px;
    background:var(--tile);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .opt-image svg{width:38px;height:38px;}
  .opt-image img{width:100%;height:100%;object-fit:cover;display:block;}
  .opt-body{padding:12px 14px 14px;}
  .opt-title-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    margin-bottom:4px;
  }
  .opt-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:14.5px;
    margin:0;
  }
  .opt-title-row svg{width:16px;height:16px;flex:0 0 auto;color:var(--grey);}
  .opt-desc{
    font-size:12.5px;
    color:var(--grey);
    margin:0;
    line-height:1.4;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:26px 24px;
  }
  .q-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:19px;
    margin:0 0 18px;
    letter-spacing:-.005em;
  }
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
  }
  .back-btn{
    background:none;
    border:none;
    color:var(--grey);
    font-size:14px;
    font-family:'Mulish', sans-serif;
    cursor:pointer;
    padding:6px 0;
  }
  .back-btn:hover{color:var(--charcoal);}
  .back-btn:disabled{opacity:0; pointer-events:none;}

  .results-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--signal);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:0 0 6px;
  }
  .results-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 18px;
  }
  .note{
    background:var(--signal-bg);
    color:var(--signal);
    border-radius:10px;
    padding:12px 14px;
    font-size:13.5px;
    margin-bottom:18px;
  }
  .bike-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .bike-card{
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 18px;
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .bike-icon{
    flex:0 0 auto;
    width:48px;
    height:48px;
    border-radius:10px;
    background:var(--offwhite);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .bike-icon svg{width:28px;height:28px;}
  .bike-main{flex:1;min-width:0;}
  .bike-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:4px;
  }
  .bike-name{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:16px;
    margin:0;
  }
  .bike-price{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
    color:var(--brand);
  }
  .bike-tag{
    display:inline-block;
    font-size:11.5px;
    font-family:'IBM Plex Mono', monospace;
    color:var(--grey);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:6px;
  }
  .bike-reason{
    font-size:13.5px;
    color:var(--grey);
    margin:0 0 10px;
  }
  .bike-cta{
    display:inline-block;
    font-size:13.5px;
    font-weight:500;
    color:var(--brand);
    text-decoration:none;
    border-bottom:1px solid var(--brand);
    padding-bottom:1px;
  }
  .restart-row{margin-top:24px;}
  .restart-btn{
    background:none;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 16px;
    font-size:14px;
    font-family:'Mulish', sans-serif;
    cursor:pointer;
    color:var(--charcoal);
  }
  .restart-btn:hover{border-color:var(--brand);}

  .fade-in{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .road-fill,.road-marker{transition:none;}
    .fade-in{animation:none;}
  }
</style>
</head>

let step = 0;
const answers = {};
const quizEl = document.getElementById("quiz");
const roadFill = document.getElementById("roadFill");
const roadMarker = document.getElementById("roadMarker");
const stepLabel = document.getElementById("stepLabel");
const stepHint = document.getElementById("stepHint");

function updateRoad(){
  const total = QUESTIONS.length;
  const pct = step >= total ? 100 : (step / total) * 100;
  roadFill.style.width = pct + "%";
  roadMarker.style.left = pct + "%";
  if(step >= total){
    stepLabel.textContent = "Klaar";
    stepHint.textContent = "Jouw advies";
  } else {
    stepLabel.textContent = "Vraag " + (step+1) + " van " + total;
    stepHint.textContent = "";
  }
}

function iconWrap(inner){
  return '<svg viewBox="0 0 48 48" fill="none" stroke="#669933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
}

const GEBRUIK_ICONS = {
  "woon-werk": iconWrap('<rect x="12" y="20" width="24" height="16" rx="2"></rect><path d="M19 20v-4a5 5 0 0 1 10 0v4"></path>'),
  "sport": iconWrap('<circle cx="24" cy="25" r="13"></circle><path d="M24 18v7l5 4"></path><path d="M24 9v3"></path>'),
  "recreatie": iconWrap('<path d="M24 8c6 6 9 11 9 16a9 9 0 0 1-18 0c0-5 3-10 9-16Z"></path><path d="M24 28v8"></path>'),
  "mix": iconWrap('<path d="M8 16h11l-3-3"></path><path d="M8 16l3 3"></path><path d="M40 32H29l3-3"></path><path d="M40 32l-3 3"></path><path d="M8 32h32"></path>')
};

function barsIcon(level){
  const heights = [8,14,20,26];
  let bars = "";
  for(let i=0;i<4;i++){
    const h = heights[i];
    const x = 8 + i*10;
    const y = 34 - h;
    const color = i < level ? "#669933" : "#C9C3B6";
    bars += '<rect x="'+x+'" y="'+y+'" width="6" height="'+h+'" rx="1.5" fill="'+color+'" stroke="none"></rect>';
  }
  return '<svg viewBox="0 0 48 48">' + bars + '</svg>';
}

function bikeBadgeIcon(badge){
  const bike = '<circle cx="13" cy="32" r="7"></circle><circle cx="35" cy="32" r="7"></circle><path d="M13 32L20 16h9l6 9"></path><path d="M20 16l4-6h4"></path>';
  const badges = {
    house: '<path d="M30 8l5 4v6h-10v-6l5-4Z" fill="#669933" stroke="none"></path>',
    bolt: '<path d="M32 6l-5 7h4l-5 7 7-6h-4l5-8Z" fill="#669933" stroke="none"></path>',
    speed: '<path d="M27 8h11M30 12h8M33 16h5" stroke="#669933"></path>',
    mountain: '<path d="M24 6l6 9h-12l6-9Z" fill="#669933" stroke="none"></path><path d="M30 8l8 12h-9" fill="#669933" stroke="none"></path>',
    question: '<circle cx="24" cy="24" r="14"></circle><path d="M20 19a4 4 0 1 1 6 3.5c-1.5 1-2 2-2 3.5"></path><circle cx="24" cy="31" r="0.6" fill="#669933"></circle>'
  };
  if(badge === "question") return iconWrap(badges.question);
  return iconWrap(bike + badges[badge]);
}

function cargoBikeIcon(){
  return iconWrap(
    '<rect x="5" y="20" width="16" height="11" rx="1.5"></rect>' +
    '<circle cx="11" cy="36" r="5"></circle>' +
    '<circle cx="38" cy="36" r="6"></circle>' +
    '<path d="M21 26h9l8 10"></path>' +
    '<path d="M27 26v-7h5"></path>'
  );
}

function coinsIcon(level){
  let coins = "";
  for(let i=0;i<level;i++){
    const y = 32 - i*6;
    coins += '<ellipse cx="24" cy="'+y+'" rx="11" ry="5" fill="none" stroke="#669933"></ellipse>';
  }
  return '<svg viewBox="0 0 48 48" stroke-width="2">' + coins + '</svg>';
}

function getTileIcon(qKey, value){
  if(qKey === "gebruik") return GEBRUIK_ICONS[value];
  if(qKey === "afstand"){
    const levels = {"<5km":1, "5-15km":2, "15-30km":3, "30km+":4};
    return barsIcon(levels[value]);
  }
  if(qKey === "type"){
    if(value === "bakfiets") return cargoBikeIcon();
    const badges = {"stadsfiets":"house", "e-bike":"bolt", "racefiets":"speed", "mountainbike":"mountain", "geen":"question"};
    return bikeBadgeIcon(badges[value]);
  }
  if(qKey === "budget"){
    const levels = {100:1, 150:2, 200:3};
    return coinsIcon(levels[value] || 4);
  }
  return "";
}

function chevron(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>';
}

function minPriceForType(type){
  const all = BIKES.map(b => b.vanaf_prijs);
  if(!type || type === "geen") return Math.min(...all);
  const matches = BIKES.filter(b => b.type === type).map(b => b.vanaf_prijs);
  return matches.length ? Math.min(...matches) : Math.min(...all);
}

function renderQuestion(){
  const q = QUESTIONS[step];
  let options = q.options;
  if(q.key === "budget"){
    const minP = minPriceForType(answers.type);
    options = q.options.filter(o => o.value > minP);
  }
  const cardsHtml = options.map((o, i) =>
    '<button class="opt-card" data-index="' + i + '">' +
      '<div class="opt-image">' + (o.image ? '<img src="' + o.image + '" alt="' + o.label + '">' : getTileIcon(q.key, o.value)) + '</div>' +
      '<div class="opt-body">' +
        '<div class="opt-title-row">' +
          '<p class="opt-title">' + o.label + '</p>' +
          chevron() +
        '</div>' +
        '<p class="opt-desc">' + o.desc + '</p>' +
      '</div>' +
    '</button>'
  ).join("");
  quizEl.innerHTML =
    '<div class="card fade-in">' +
      '<p class="q-title">' + q.title + '</p>' +
      '<div class="opt-grid">' + cardsHtml + '</div>' +
      '<div class="nav-row">' +
        '<button class="back-btn" id="backBtn" ' + (step===0 ? "disabled" : "") + '>&larr; Vorige vraag</button>' +
      '</div>' +
    '</div>';

  quizEl.querySelectorAll(".opt-card").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.getAttribute("data-index"), 10);
      answers[q.key] = options[idx].value;
      step++;
      updateRoad();
      if(step >= QUESTIONS.length){
        renderResults();
      } else {
        renderQuestion();
      }
    });
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    if(step > 0){
      step--;
      updateRoad();
      renderQuestion();
    }
  });
}

function scoreBike(bike){
  let score = 0;
  if(answers.gebruik === "mix"){
    if(bike.gebruik.includes("woon-werk") || bike.gebruik.includes("recreatie")) score += 2;
  } else if(bike.gebruik.includes(answers.gebruik)){
    score += 3;
  }
  if(bike.afstand.includes(answers.afstand)) score += 2;
  if(answers.type !== "geen" && bike.type === answers.type) score += 3;
  return score;
}

function getRecommendations(){
  const budgetMax = answers.budget;
  let pool = BIKES.filter(b => b.vanaf_prijs <= budgetMax);
  let outOfBudgetNote = false;

  if(pool.length === 0){
    outOfBudgetNote = true;
    pool = [...BIKES].sort((a,b) => a.vanaf_prijs - b.vanaf_prijs).slice(0,3);
  } else {
    pool = pool
      .map(b => ({bike:b, score:scoreBike(b)}))
      .sort((a,b) => b.score - a.score || b.bike.vanaf_prijs - a.bike.vanaf_prijs)
      .slice(0,3)
      .map(x => x.bike);
  }
  return {pool, outOfBudgetNote};
}

function reasonFor(bike){
  const parts = [];
  if(answers.gebruik !== "mix" && bike.gebruik.includes(answers.gebruik)){
    const map = {"woon-werk":"woon-werkverkeer","sport":"sport en training","recreatie":"recreatief fietsen"};
    parts.push("past bij " + map[answers.gebruik]);
  }
  if(bike.afstand.includes(answers.afstand)) parts.push("is geschikt voor jouw ritafstand");
  if(answers.type !== "geen" && bike.type === answers.type) parts.push("is het type dat je zocht");
  if(parts.length === 0) parts.push("sluit het dichtst aan op jouw antwoorden");
  return "Deze fiets " + parts.join(", ") + ".";
}

function bikeIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#669933" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<circle cx="5.5" cy="17.5" r="3.5"></circle>' +
    '<circle cx="18.5" cy="17.5" r="3.5"></circle>' +
    '<path d="M5.5 17.5L9 9h4l3 4.5"></path>' +
    '<path d="M9 9l2-3h2"></path>' +
  '</svg>';
}

function renderResults(){
  const {pool, outOfBudgetNote} = getRecommendations();

  const noteHtml = outOfBudgetNote
    ? '<p class="note">Binnen jouw budget vonden we geen passende fiets. Hieronder de drie goedkoopste opties, zodat je kan zien hoe dicht je bij jouw budget komt.</p>'
    : "";

  const bikesHtml = pool.map(bike => {
    const priceLabel = bike.vanaf_prijs === bike.tot_prijs
      ? "€" + bike.vanaf_prijs + " / mnd"
      : "vanaf €" + bike.vanaf_prijs + " / mnd";
    return (
      '<div class="bike-card">' +
        '<div class="bike-icon">' + bikeIcon() + '</div>' +
        '<div class="bike-main">' +
          '<div class="bike-top">' +
            '<p class="bike-name">' + bike.naam + '</p>' +
            '<span class="bike-price">' + priceLabel + '</span>' +
          '</div>' +
          '<span class="bike-tag">' + TYPE_LABELS[bike.type] + '</span>' +
          '<p class="bike-reason">' + reasonFor(bike) + '</p>' +
          '<a class="bike-cta" href="' + bike.product_url + '">Bekijk fiets &rarr;</a>' +
        '</div>' +
      '</div>'
    );
  }).join("");

  quizEl.innerHTML =
    '<div class="fade-in">' +
      '<div class="title-row" style="margin-bottom:18px;"><div class="title-bar"></div><div><p class="results-eyebrow">Jouw advies</p><p class="results-title">Deze fietsen passen bij jou</p></div></div>' +
      noteHtml +
      '<div class="bike-list">' + bikesHtml + '</div>' +
      '<div class="restart-row">' +
        '<button class="restart-btn" id="restartBtn">Opnieuw beginnen</button>' +
      '</div>' +
    '</div>';

  document.getElementById("restartBtn").addEventListener("click", () => {
    step = 0;
    for(const k in answers) delete answers[k];
    updateRoad();
    renderQuestion();
  });
}

updateRoad();
renderQuestion();
</script>
</body>
</html>
