<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fietskeuzehulp — Fietslease Holland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Mulish:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#282A2B;
    --track-bg:#DCDCDC;
    --offwhite:#EFEFEF;
    --card:#FFFFFF;
    --brand:#669933;
    --brand-dark:#4F7727;
    --signal:#4F7727;
    --signal-bg:#E7EFDC;
    --grey:#545454;
    --border:#D6D6D2;
    --tile:#E7ECDF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--offwhite);
    color:var(--charcoal);
    font-family:'Mulish', system-ui, sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    padding:28px 20px 40px;
  }
  @media (min-width: 700px){
    .app{ max-width:760px; }
    .result-photo{ width:190px; height:140px; flex:0 0 190px; }
    .checklist{ grid-template-columns:repeat(3, 1fr); }
    .result-card{ padding:24px 28px; }
  }
  .logo{
    height:30px;
    display:block;
    margin:0 0 22px;
  }
  .title-row{
    display:flex;
    align-items:stretch;
    gap:12px;
    margin:0 0 10px;
  }
  .title-bar{
    flex:0 0 4px;
    width:4px;
    background:var(--brand);
    border-radius:2px;
  }
  h1{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:26px;
    line-height:1.25;
    margin:0;
    letter-spacing:-.01em;
  }
  .intro{
    color:var(--grey);
    font-size:15px;
    margin:0 0 26px;
    max-width:46ch;
  }
  .road-wrap{margin-bottom:26px;}
  .road{
    position:relative;
    height:6px;
    background:var(--track-bg);
    border-radius:3px;
    overflow:visible;
  }
  .road-fill{
    position:absolute;
    inset:0 auto 0 0;
    width:0%;
    background:var(--brand);
    border-radius:3px;
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }
  .road-marker{
    position:absolute;
    top:50%;
    left:0%;
    transform:translate(-50%,-50%);
    width:18px;
    height:18px;
    background:var(--brand);
    border:2px solid var(--offwhite);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:left .45s cubic-bezier(.4,0,.2,1);
  }
  .road-marker svg{width:10px;height:10px;display:block;}
  .road-label{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--grey);
  }
  .opt-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:12px;
    align-items:stretch;
  }
  .opt-card{
    text-align:left;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--card);
    padding:0;
    overflow:hidden;
    cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
  }
  .opt-card:hover{border-color:var(--brand);}
  .opt-card:focus-visible{outline:2px solid var(--brand); outline-offset:2px;}
  .opt-image{
    height:130px;
    flex-shrink:0;
    background:var(--tile);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .opt-image svg{width:38px;height:38px;}
  .opt-image img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .opt-body{padding:12px 14px 14px; flex:1; display:flex; flex-direction:column; justify-content:space-between;}
  .opt-title-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    margin-bottom:4px;
  }
  .opt-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:14.5px;
    margin:0;
  }
  .opt-title-row svg{width:16px;height:16px;flex:0 0 auto;color:var(--grey);}
  .opt-desc{
    font-size:12.5px;
    color:var(--grey);
    margin:0;
    line-height:1.4;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:26px 24px;
  }
  .q-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:19px;
    margin:0 0 6px;
    letter-spacing:-.005em;
  }
  .q-subtitle{
    font-size:13.5px;
    color:var(--grey);
    margin:0 0 18px;
  }
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
  }
  .back-btn{
    background:none;
    border:none;
    color:var(--grey);
    font-size:14px;
    font-family:'Mulish', sans-serif;
    cursor:pointer;
    padding:6px 0;
  }
  .back-btn:hover{color:var(--charcoal);}
  .back-btn:disabled{opacity:0; pointer-events:none;}

  .results-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--signal);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:0 0 6px;
  }
  .results-title{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 18px;
  }
  .note{
    background:var(--signal-bg);
    color:var(--signal);
    border-radius:10px;
    padding:12px 14px;
    font-size:13.5px;
    margin-bottom:18px;
  }
  .bike-list{
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  /* Text-only option cards (no image/icon) */
  .opt-card--text{
    flex-direction:row;
    align-items:center;
    padding:16px 18px;
  }
  .opt-card--text .opt-body{
    flex:1;
    justify-content:center;
  }
  .opt-card--text .opt-title-row{ margin-bottom:2px; }

  /* ── Result cards ── */
  .result-card{
    position:relative;
    border:1px solid var(--border);
    border-radius:20px;
    padding:24px;
    background:var(--card);
    box-shadow:0 2px 12px rgba(0,0,0,.06);
    transition:box-shadow .2s;
  }
  .result-card + .result-card{ margin-top:20px; }
  .result-card.is-best{
    border:2px solid var(--brand);
    box-shadow:0 4px 24px rgba(102,153,51,.15);
  }
  .best-badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    position:absolute;
    top:-13px;
    left:22px;
    background:var(--brand);
    color:#fff;
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:11.5px;
    letter-spacing:.3px;
    padding:4px 12px 4px 9px;
    border-radius:999px;
  }
  .best-badge::before{
    content:"★";
    font-size:10px;
  }
  .result-top{
    display:flex;
    gap:20px;
    margin-bottom:18px;
    align-items:flex-start;
  }
  .result-photo{
    flex:0 0 160px;
    width:160px;
    height:120px;
    border-radius:14px;
    overflow:hidden;
    background:#f8f8f8;
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px;
  }
  .result-photo img{width:100%;height:100%;object-fit:contain;display:block;}
  .result-photo svg{width:44px;height:44px;}
  .result-info{flex:1;min-width:0;padding-top:2px;}
  .result-name{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:19px;
    margin:0 0 6px;
    color:var(--charcoal);
    line-height:1.2;
  }
  .result-price{
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    font-weight:500;
    color:var(--brand);
    margin:0 0 0;
    display:flex;
    align-items:baseline;
    gap:8px;
    flex-wrap:wrap;
  }
  .price-original{
    text-decoration:line-through;
    color:var(--grey);
    font-size:13px;
    font-weight:400;
  }
  .price-sale{
    color:#3a7d44;
    font-weight:700;
  }
  .sale-tag{
    display:inline-block;
    background:#edf7ee;
    color:#3a7d44;
    font-family:'Poppins',sans-serif;
    font-size:11px;
    font-weight:600;
    padding:2px 7px;
    border-radius:6px;
    margin-left:4px;
    vertical-align:middle;
  }
  .result-divider{
    border:none;
    border-top:1px solid var(--border);
    margin:0 0 16px;
  }
  .result-cta{
    display:block;
    text-align:center;
    background:var(--brand);
    color:#fff;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:14.5px;
    padding:14px 16px;
    border-radius:12px;
    text-decoration:none;
    margin-bottom:20px;
    letter-spacing:.2px;
    transition:background .15s, transform .1s;
  }
  .result-cta:hover{background:var(--brand-dark); transform:translateY(-1px);}
  .checklist{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:9px 16px;
  }
  .check-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--charcoal);
    background:var(--offwhite);
    border-radius:8px;
    padding:7px 10px;
  }
  .check-item.check-no{
    color:var(--grey);
    background:transparent;
  }
  .check-dot{
    flex:0 0 auto;
    width:18px;
    height:18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .check-dot.yes{background:var(--brand);}
  .check-dot.no{background:#e0e0e0;}
  .check-dot svg{width:9px;height:9px;}
  .bike-card{
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px 18px;
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .bike-icon{
    flex:0 0 auto;
    width:64px;
    height:64px;
    border-radius:10px;
    background:var(--offwhite);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .bike-icon svg{width:28px;height:28px;}
  .bike-icon img{width:100%;height:100%;object-fit:cover;display:block;}
  .bike-icon-fallback{display:none; width:100%; height:100%; align-items:center; justify-content:center;}
  .bike-main{flex:1;min-width:0;}
  .bike-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:4px;
  }
  .bike-name{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:16px;
    margin:0;
  }
  .bike-price{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
    color:var(--brand);
  }
  .bike-tag{
    display:inline-block;
    font-size:11.5px;
    font-family:'IBM Plex Mono', monospace;
    color:var(--grey);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:6px;
  }
  .bike-reason{
    font-size:13.5px;
    color:var(--grey);
    margin:0 0 10px;
  }
  .bike-cta{
    display:inline-block;
    font-size:13.5px;
    font-weight:500;
    color:var(--brand);
    text-decoration:none;
    border-bottom:1px solid var(--brand);
    padding-bottom:1px;
  }
  .restart-row{margin-top:24px;}
  .restart-btn{
    background:none;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 16px;
    font-size:14px;
    font-family:'Mulish', sans-serif;
    cursor:pointer;
    color:var(--charcoal);
  }
  .restart-btn:hover{border-color:var(--brand);}

  .fade-in{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .road-fill,.road-marker{transition:none;}
    .fade-in{animation:none;}
  }
</style>
</head>

const TYPE_LABELS = {
  "stadsfiets":"Stadsfiets", "e-bike":"E-bike",
  "racefiets":"Racefiets", "mountainbike":"Mountainbike", "bakfiets":"Bakfiets"
};

let step = 0;
const answers = {};
const quizEl = document.getElementById("quiz");
const roadFill = document.getElementById("roadFill");
const roadMarker = document.getElementById("roadMarker");
const stepLabel = document.getElementById("stepLabel");
const stepHint = document.getElementById("stepHint");

function getActiveQuestions(){
  return QUESTIONS.filter(q => q.condition(answers));
}

function updateRoad(){
  const total = getActiveQuestions().length;
  const pct = step >= total ? 100 : (step / total) * 100;
  roadFill.style.width = pct + "%";
  roadMarker.style.left = pct + "%";
  if(step >= total){
    stepLabel.textContent = "Klaar";
    stepHint.textContent = "Jouw advies";
  } else {
    stepLabel.textContent = "Vraag " + (step+1) + " van " + total;
    stepHint.textContent = "";
  }
}

function iconWrap(inner){
  return '<svg viewBox="0 0 48 48" fill="none" stroke="#669933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
}

const GEBRUIK_ICONS = {
  "woon-werk": iconWrap('<rect x="12" y="20" width="24" height="16" rx="2"></rect><path d="M19 20v-4a5 5 0 0 1 10 0v4"></path>'),
  "sport": iconWrap('<circle cx="24" cy="25" r="13"></circle><path d="M24 18v7l5 4"></path><path d="M24 9v3"></path>'),
  "recreatie": iconWrap('<path d="M24 8c6 6 9 11 9 16a9 9 0 0 1-18 0c0-5 3-10 9-16Z"></path><path d="M24 28v8"></path>'),
  "mix": iconWrap('<path d="M8 16h11l-3-3"></path><path d="M8 16l3 3"></path><path d="M40 32H29l3-3"></path><path d="M40 32l-3 3"></path><path d="M8 32h32"></path>')
};

  const heights = [8,14,20,26];
  let bars = "";
  for(let i=0;i<4;i++){
    const h = heights[i];
    const x = 8 + i*10;
    const y = 34 - h;
    const color = i < level ? "#669933" : "#C9C3B6";
    bars += '<rect x="'+x+'" y="'+y+'" width="6" height="'+h+'" rx="1.5" fill="'+color+'" stroke="none"></rect>';
  }
  return '<svg viewBox="0 0 48 48">' + bars + '</svg>';
}

    speed: '<path d="M27 8h11M30 12h8M33 16h5" stroke="#669933"></path>',
    mountain: '<path d="M24 6l6 9h-12l6-9Z" fill="#669933" stroke="none"></path><path d="M30 8l8 12h-9" fill="#669933" stroke="none"></path>',
    question: '<circle cx="24" cy="24" r="14"></circle><path d="M20 19a4 4 0 1 1 6 3.5c-1.5 1-2 2-2 3.5"></path><circle cx="24" cy="31" r="0.6" fill="#669933"></circle>'

function cargoBikeIcon(){
  return iconWrap(
    '<rect x="5" y="20" width="16" height="11" rx="1.5"></rect>' +
    '<circle cx="11" cy="36" r="5"></circle>' +
    '<circle cx="38" cy="36" r="6"></circle>' +
    '<path d="M21 26h9l8 10"></path>' +
    '<path d="M27 26v-7h5"></path>'

function coinsIcon(level){
  let coins = "";
  for(let i=0;i<level;i++){
    const y = 32 - i*6;
    coins += '<ellipse cx="24" cy="'+y+'" rx="11" ry="5" fill="none" stroke="#669933"></ellipse>';

function getTileIcon(qKey, value){
  if(qKey === "gebruik") return GEBRUIK_ICONS[value];
  if(qKey === "afstand"){
    const levels = {"<5km":1, "5-15km":2, "15-30km":3, "30km+":4};
    return barsIcon(levels[value]);
  }
  if(qKey === "type"){
    if(value === "bakfiets") return cargoBikeIcon();
    const badges = {"stadsfiets":"house", "e-bike":"bolt", "racefiets":"speed", "mountainbike":"mountain", "geen":"question"};
    return bikeBadgeIcon(badges[value]);
  }
  if(qKey === "budget"){
    const levels = {100:1, 150:2, 200:3};
    return coinsIcon(levels[value] || 4);
  }
  if(qKey === "model"){
    const frames = {
      dames: '<path d="M13 32L24 16h6l8 16"></path><path d="M24 16l3-6h4"></path>',
      heren: '<path d="M13 32L24 16h11l-3 16"></path><path d="M24 16l3-6h4"></path>',
      trapeze: '<path d="M13 32L20 18h6l11 14"></path><path d="M20 18l3-8h4"></path>',
      geen: '<circle cx="24" cy="24" r="14"></circle><path d="M20 19a4 4 0 1 1 6 3.5c-1.5 1-2 2-2 3.5"></path><circle cx="24" cy="31" r="0.6" fill="#669933"></circle>'
    };
    if(value === "geen") return iconWrap('<circle cx="13" cy="32" r="7"></circle><circle cx="35" cy="32" r="7"></circle>' + frames.geen);
    return iconWrap('<circle cx="13" cy="32" r="7"></circle><circle cx="35" cy="32" r="7"></circle>' + frames[value]);
  }
  if(qKey === "aandrijving"){
    if(value === "geen") return bikeBadgeIcon("question");
    if(value === "ketting-derailleur") return iconWrap('<circle cx="14" cy="24" r="3"></circle><circle cx="34" cy="24" r="6"></circle><circle cx="34" cy="32" r="3"></circle><path d="M14 24h17"></path><path d="M34 18v6"></path>');
    if(value === "ketting-naaf") return iconWrap('<circle cx="14" cy="24" r="3"></circle><circle cx="34" cy="24" r="6"></circle><path d="M14 24h14"></path>');
    if(value === "riem-naaf") return iconWrap('<circle cx="14" cy="24" r="3"></circle><circle cx="34" cy="24" r="6"></circle><path d="M14 21h14M14 27h14"></path>');
    return "";
  }
  if(qKey === "motorplaats"){
    const frame = '<circle cx="13" cy="32" r="7"></circle><circle cx="35" cy="32" r="7"></circle><path d="M13 32L24 16h9l6 9"></path><path d="M24 16l3-6h4"></path>';
    if(value === "geen") return bikeBadgeIcon("question");
    if(value === "midden") return iconWrap(frame + '<circle cx="24" cy="22" r="4" fill="#669933" stroke="none"></circle>');
    if(value === "voor") return iconWrap(frame + '<circle cx="13" cy="32" r="4" fill="#669933" stroke="none"></circle>');
    if(value === "achter") return iconWrap(frame + '<circle cx="35" cy="32" r="4" fill="#669933" stroke="none"></circle>');
    return "";
  }
  return "";
}

function chevron(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>';
}

function minPriceForType(type){
  const all = BIKES.map(b => b.vanaf_prijs);
  if(!type || type === "geen") return Math.min(...all);
  const matches = BIKES.filter(b => b.type === type).map(b => b.vanaf_prijs);
  return matches.length ? Math.min(...matches) : Math.min(...all);
}

function renderQuestion(){
  const activeQuestions = getActiveQuestions();
  const q = activeQuestions[step];
  let options = q.options;
  if(q.key === "budget"){
    const minP = minPriceForType(answers.type);
    options = q.options.filter(o => o.value > minP);
  }
  if(q.key === "gebruik"){
    const allowed = TYPE_GEBRUIK_OPTIONS[answers.type] || TYPE_GEBRUIK_OPTIONS["geen"];
    options = q.options.filter(o => allowed.includes(o.value));
  }
  const cardsHtml = options.map((o, i) => {
    const forceText = q.key === 'gebruik' || q.key === 'budget' || o.value === 'geen' || o.value === 0;
    const iconHtml = (!forceText && o.image)
      ? '<img src="' + o.image + '" alt="' + o.label + '">'
      : (!forceText ? getTileIcon(q.key, o.value) : '');
    const hasVisual = !forceText && !!(o.image || iconHtml);
    return (
      '<button class="opt-card' + (hasVisual ? '' : ' opt-card--text') + '" data-index="' + i + '">' +
        (hasVisual ? '<div class="opt-image">' + iconHtml + '</div>' : '') +
        '<div class="opt-body">' +
          '<div class="opt-title-row">' +
            '<p class="opt-title">' + o.label + '</p>' +
            chevron() +
          '</div>' +
          '<p class="opt-desc">' + o.desc + '</p>' +
        '</div>' +
      '</button>'
    );
  }).join("");
  quizEl.innerHTML =
    '<div class="card fade-in">' +
      '<p class="q-title">' + q.title + '</p>' +
      (q.subtitle ? '<p class="q-subtitle">' + q.subtitle + '</p>' : '') +
      '<div class="opt-grid">' + cardsHtml + '</div>' +
      '<div class="nav-row">' +
        '<button class="back-btn" id="backBtn" ' + (step===0 ? "disabled" : "") + '>&larr; Vorige vraag</button>' +
      '</div>' +
    '</div>';

  quizEl.querySelectorAll(".opt-card").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.getAttribute("data-index"), 10);
      answers[q.key] = options[idx].value;
      step++;
      updateRoad();
      if(step >= getActiveQuestions().length){
        renderResults();
      } else {
        renderQuestion();
      }
    });
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    if(step > 0){
      step--;
      updateRoad();
      renderQuestion();
    }
  });
}

function scoreBike(bike){
  let score = 0;
  if(answers.gebruik === "mix"){
    if(bike.gebruik.includes("woon-werk") || bike.gebruik.includes("recreatie")) score += 2;
  } else if(bike.gebruik.includes(answers.gebruik)){
    score += 3;
  }
  if(answers.type !== "geen" && bike.type === answers.type) score += 3;
  if(answers.model && answers.model !== "geen"){
    if(bike.model.includes(answers.model)) score += 2;
  }
  if(answers.aandrijving && answers.aandrijving !== "geen"){
    const [aandr, versn] = answers.aandrijving.split("-");
    if(bike.aandrijving === aandr) score += 1;
    if(bike.versnelling === versn) score += 1;
  }
  if(answers.motorplaats && answers.motorplaats !== "geen"){
    if(bike.motorplaats === answers.motorplaats) score += 2;
  }
  if(answers.actieradius && answers.actieradius !== 0){
    const opties = bike.accu_opties;
    if(opties && opties.length > 0){
      // Wh-drempel per categorie (max accu moet dit halen)
      const drempel = {60:1, 75:350, 120:500, 999:750}[answers.actieradius] || 0;
      const maxWh = Math.max(...opties);
      const minWh = Math.min(...opties);
      if(maxWh >= drempel) score += 3;        // beste optie haalt het
      else if(minWh >= drempel * 0.8) score += 1;  // bijna
      else score -= 2;
    }
  }
  return score;
}

function getRecommendations(){
  const budgetMax = answers.budget;
  const wantType = answers.type;
  const candidatePool = (wantType && wantType !== "geen")
    ? BIKES.filter(b => b.type === wantType)
    : BIKES;

  let outOfBudgetNote = false;
  // Gebruik aanbiedingsprijs als die beschikbaar is voor budgetvergelijking
  function effectiefPrijs(b){ return b.aanbieding_prijs || b.vanaf_prijs; }
  let pool = candidatePool.filter(b => effectiefPrijs(b) <= budgetMax);

  if(pool.length === 0){
    outOfBudgetNote = true;
    pool = candidatePool
      .map(b => ({bike:b, score:scoreBike(b)}))
      .sort((a,b) => b.score - a.score || a.bike.vanaf_prijs - b.bike.vanaf_prijs)
      .slice(0,3)
      .map(x => x.bike);
  } else {
    pool = pool
      .map(b => ({bike:b, score:scoreBike(b)}))
      .sort((a,b) => b.score - a.score || b.bike.vanaf_prijs - a.bike.vanaf_prijs)
      .slice(0,3)
      .map(x => x.bike);
  }
  return {pool, outOfBudgetNote};
}

function checklistFor(bike){
  const items = [];
  items.push({label: TYPE_LABELS[bike.type], ok:true});
  if(answers.gebruik && answers.gebruik !== "mix"){
    const map = {"woon-werk":"Geschikt voor woon-werk","sport":"Geschikt voor sport en training","recreatie":"Geschikt voor recreatief fietsen"};
    items.push({label: map[answers.gebruik], ok: bike.gebruik.includes(answers.gebruik)});
  }
  if(answers.model && answers.model !== "geen"){
    const map = {"dames":"Damesmodel", "heren":"Herenmodel", "trapeze":"Trapeze model"};
    items.push({label: map[answers.model], ok: bike.model.includes(answers.model)});
  }
  if(answers.aandrijving && answers.aandrijving !== "geen"){
    const map = {"ketting-derailleur":"Ketting met derailleur","ketting-naaf":"Ketting met naafversnelling","riem-naaf":"Riemaandrijving"};
    const wantAandr = answers.aandrijving.split("-")[0];
    const wantVersn = answers.aandrijving.split("-")[1];
    items.push({label: map[answers.aandrijving], ok: bike.aandrijving === wantAandr && bike.versnelling === wantVersn});
  }
  if(answers.motorplaats && answers.motorplaats !== "geen"){
    const map = {"midden":"Middenmotor","voor":"Voorwielmotor","achter":"Achterwielmotor"};
    items.push({label: map[answers.motorplaats], ok: bike.motorplaats === answers.motorplaats});
  }
  if(bike.actieradius_min && bike.accu_opties && bike.accu_opties.length > 0){
    const opties = bike.accu_opties;
    const whLabel = opties.length === 1
      ? opties[0] + " Wh"
      : opties[0] + "–" + opties[opties.length-1] + " Wh";
    items.push({label: whLabel + " (" + bike.actieradius_min + "–" + bike.actieradius_max + " km)", ok:true});
  }
  if(bike.motor) items.push({label: bike.motor, ok:true});
  return items;
}

function checkDot(ok){
  const icon = ok
    ? '<svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5l3 3 6-7"></path></svg>'
    : '<svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M4 8h8"></path></svg>';
  return '<span class="check-dot ' + (ok ? "yes" : "no") + '">' + icon + '</span>';
}

function bikeIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#669933" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<circle cx="5.5" cy="17.5" r="3.5"></circle>' +
    '<circle cx="18.5" cy="17.5" r="3.5"></circle>' +

    '<path d="M9 9l2-3h2"></path>' +
  '</svg>';
}

function renderResults(){
  const {pool, outOfBudgetNote} = getRecommendations();

  // Antwoorden lokaal opslaan (handig als de tool ooit los van een iframe draait)
  // en doorsturen naar de pagina die deze iframe embedt, zodat de rest van de
  // site (bijv. productpagina's) kan checken of een fiets bij deze antwoorden past.
  try {
    const answersForExport = Object.assign({}, answers, {
      budget: (answers.budget === Infinity) ? "geen-maximum" : answers.budget
    });
    const payload = {
      type: "flh-fietskeuze-result",
      answers: answersForExport,
      timestamp: Date.now()
    };
    localStorage.setItem("flh_fietskeuze_antwoorden", JSON.stringify(payload));
    if(window.parent && window.parent !== window){
      window.parent.postMessage(payload, "https://www.fietsleaseholland.nl");
    }
  } catch(e) {
    // localStorage of postMessage niet beschikbaar (bijv. privacy-instellingen browser); negeren
  }

  const noteHtml = outOfBudgetNote
    ? '<p class="note">Binnen jouw budget vonden we geen passende fiets. Hieronder de drie goedkoopste opties, zodat je kan zien hoe dicht je bij jouw budget komt.</p>'
    : "";

  const bikesHtml = pool.map((bike, i) => {
    function fmtPrice(p){
      // Formatteer als Nederlandse prijs: punt → komma, altijd 2 decimalen
      return p.toFixed(2).replace('.', ',');
    }
    let priceHtml;
    if(bike.aanbieding_prijs){
      const saved = Math.round(bike.vanaf_prijs - bike.aanbieding_prijs);
      priceHtml =
        '<span class="price-original">vanaf €' + fmtPrice(bike.vanaf_prijs) + ' / mnd</span>' +
        '<span class="price-sale">€' + fmtPrice(bike.aanbieding_prijs) + ' / mnd</span>' +
        '<span class="sale-tag">€' + saved + ' korting</span>';
    } else {
      priceHtml = 'vanaf €' + fmtPrice(bike.vanaf_prijs) + ' / mnd';
    }
    const checklistHtml = checklistFor(bike).map(item =>
      '<div class="check-item' + (item.ok ? '' : ' check-no') + '">' + checkDot(item.ok) + '<span>' + item.label + '</span></div>'
    ).join("");
    return (
      '<div class="result-card' + (i === 0 ? " is-best" : "") + '">' +
        (i === 0 ? '<span class="best-badge">Beste match</span>' : "") +
        '<div class="result-top">' +
          '<div class="result-photo">' + (bike.image
            ? '<img src="' + bike.image + '" alt="' + bike.naam + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
              '<div class="bike-icon-fallback">' + bikeIcon() + '</div>'
            : bikeIcon()
          ) + '</div>' +
          '<div class="result-info">' +
            '<p class="result-name">' + bike.naam + '</p>' +
            '<p class="result-price">' + priceHtml + '</p>' +
          '</div>' +
        '</div>' +
        '<hr class="result-divider">' +
        '<a class="result-cta" href="' + bike.product_url + '" target="_blank" rel="noopener">Bekijk deze fiets →</a>' +
        '<div class="checklist">' + checklistHtml + '</div>' +
      '</div>'
    );
  }).join("");

  quizEl.innerHTML =
    '<div class="fade-in">' +
      '<div class="title-row" style="margin-bottom:18px;"><div class="title-bar"></div><div><p class="results-eyebrow">Jouw advies</p><p class="results-title">Deze fietsen passen bij jou</p></div></div>' +
      noteHtml +
      '<div class="bike-list">' + bikesHtml + '</div>' +
      '<div class="restart-row" style="display:flex; gap:12px; flex-wrap:wrap;">' +
        '<button class="back-btn" id="resultsBackBtn">&larr; Vorige vraag</button>' +
        '<button class="restart-btn" id="restartBtn">Opnieuw beginnen</button>' +
      '</div>' +
    '</div>';

  document.getElementById("resultsBackBtn").addEventListener("click", () => {
    step = Math.max(0, getActiveQuestions().length - 1);
    updateRoad();
    renderQuestion();
  });

  document.getElementById("restartBtn").addEventListener("click", () => {
    step = 0;
    for(const k in answers) delete answers[k];
    updateRoad();
    renderQuestion();
  });
}

updateRoad();
renderQuestion();
</script>
<script>
// Stuur hoogte naar parent zodat iframe meeschaalt
(function(){
  function sendHeight(){
    var h = document.documentElement.scrollHeight;
    if(window.parent && window.parent !== window){
      window.parent.postMessage({type:'flh-resize', height: h}, '*');
    }
  }
  // Bij elke DOM-wijziging hoogte doorsturen
  var ro = new ResizeObserver(sendHeight);
  ro.observe(document.body);
  sendHeight();
})();
</script>
</body>
</html>
